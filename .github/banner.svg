<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1433"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c853" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="80" x2="900" y2="80" stroke="#1a2040" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#1a2040" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="#1a2040" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="320" stroke="#1a2040" stroke-width="0.5"/>
  <line x1="450" y1="0" x2="450" y2="320" stroke="#1a2040" stroke-width="0.5"/>
  <line x1="700" y1="0" x2="700" y2="320" stroke="#1a2040" stroke-width="0.5"/>

  <!-- Upward trending chart line (background element — right side only) -->
  <polyline points="620,180 660,170 700,175 740,155 770,140 800,125 830,100 860,70"
            stroke="url(#chartLine)" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0.6"/>
  <!-- Chart area fill -->
  <polygon points="620,180 660,170 700,175 740,155 770,140 800,125 830,100 860,70 860,190 620,190"
           fill="#00c853" opacity="0.04"/>

  <!-- Candlestick hints (right side, above text) -->
  <rect x="640" y="165" width="5" height="14" rx="1" fill="#00c853" opacity="0.25"/>
  <rect x="675" y="162" width="5" height="10" rx="1" fill="#ff1744" opacity="0.2"/>
  <rect x="715" y="150" width="5" height="16" rx="1" fill="#00c853" opacity="0.25"/>
  <rect x="755" y="135" width="5" height="14" rx="1" fill="#00c853" opacity="0.3"/>
  <rect x="790" y="118" width="5" height="18" rx="1" fill="#00c853" opacity="0.3"/>
  <rect x="825" y="92" width="5" height="20" rx="1" fill="#00c853" opacity="0.35"/>

  <!-- Top accent line -->
  <rect x="40" y="40" width="140" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="40" y="108" font-family="monospace, 'Courier New'" font-size="66" font-weight="bold" fill="#00c853" letter-spacing="8" filter="url(#glow)">AI TRADE</text>

  <!-- Subtitle -->
  <text x="42" y="142" font-family="monospace, 'Courier New'" font-size="18" fill="#2196f3" letter-spacing="3">ANALYST</text>

  <!-- Tagline -->
  <text x="42" y="174" font-family="monospace, 'Courier New'" font-size="14" fill="#78909c">AI-Powered Trading Research &amp; Analysis Engine</text>

  <!-- Stat badges row -->
  <!-- Badge: 16 Skills -->
  <rect x="42" y="198" width="108" height="28" rx="6" fill="#0d1117" stroke="#00c853" stroke-width="1"/>
  <text x="96" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#00c853" text-anchor="middle" font-weight="bold">16 Skills</text>

  <!-- Badge: 5 Agents -->
  <rect x="162" y="198" width="100" height="28" rx="6" fill="#0d1117" stroke="#00c853" stroke-width="1"/>
  <text x="212" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#00c853" text-anchor="middle" font-weight="bold">5 Agents</text>

  <!-- Badge: Options -->
  <rect x="274" y="198" width="98" height="28" rx="6" fill="#0d1117" stroke="#ffd700" stroke-width="1"/>
  <text x="323" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#ffd700" text-anchor="middle" font-weight="bold">Options</text>

  <!-- Badge: PDF Reports -->
  <rect x="384" y="198" width="120" height="28" rx="6" fill="#0d1117" stroke="#ffd700" stroke-width="1"/>
  <text x="444" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#ffd700" text-anchor="middle" font-weight="bold">PDF Reports</text>

  <!-- Badge: Stock Screening -->
  <rect x="516" y="198" width="145" height="28" rx="6" fill="#0d1117" stroke="#2196f3" stroke-width="1"/>
  <text x="588" y="217" font-family="monospace, 'Courier New'" font-size="12" fill="#2196f3" text-anchor="middle" font-weight="bold">Stock Screening</text>

  <!-- Command previews -->
  <text x="42" y="260" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#00c853">/trade analyze</tspan><tspan fill="#4A5568"> 5-agent analysis</tspan>
  </text>
  <text x="310" y="260" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#00c853">/trade options</tspan><tspan fill="#4A5568"> strategy recs</tspan>
  </text>
  <text x="570" y="260" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#ffd700">/trade report-pdf</tspan><tspan fill="#4A5568"> PDF report</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="296" width="900" height="24" rx="0" fill="#060918"/>
  <text x="42" y="313" font-family="monospace, 'Courier New'" font-size="11" fill="#4A5568">
    technical + fundamental + sentiment + risk + thesis — full stock analysis in one command
  </text>
</svg>
